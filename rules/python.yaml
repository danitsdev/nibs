- id: pycache
  name: Python bytecode cache
  category: language_cache
  risk: safe
  patterns:
    - "**/__pycache__"
    - "**/*.pyc"
  reason: "This folder contains compiled Python bytecode files. Deleting this is completely safe and standard: Python will automatically recompile them from the original .py files when executed next, without any package or source loss."
  default_action: clean

- id: pytest_cache
  name: Pytest cache
  category: framework_cache
  risk: safe
  patterns:
    - "**/.pytest_cache"
  reason: "This folder contains test results and execution statistics used by pytest to run failed tests first. Deleting this is safe: pytest will regenerate the statistics cache on your next test suite execution."
  default_action: clean

- id: mypy_cache
  name: Mypy cache
  category: framework_cache
  risk: safe
  patterns:
    - "**/.mypy_cache"
  reason: "This directory contains incremental type-checking indexes used by mypy. Deleting this is safe: it does not affect code execution, though mypy's next run will take longer to compile from scratch."
  default_action: clean

- id: ruff_cache
  name: Ruff cache
  category: framework_cache
  risk: safe
  patterns:
    - "**/.ruff_cache"
  reason: "This directory contains linter and formatter cache files generated by Ruff. Deleting this is completely safe: Ruff will recompile lint indexes during the next check execution."
  default_action: clean

- id: venv
  name: Python Virtual Environment
  category: rebuildable_dependency
  risk: review
  patterns:
    - "**/.venv"
    - "**/venv"
  reason: "This folder contains local Python virtual environments and pip-installed package libraries. Deleting this is safe since your project's source code is untouched. Dependencies can be fully restored by running 'pip install -r requirements.txt' or 'poetry install'."
  restore:
    - "pip install -r requirements.txt"
    - "poetry install"
    - "pipenv install"
  default_action: review

- id: tox
  name: Tox test environment
  category: framework_cache
  risk: safe
  patterns:
    - "**/.tox"
  reason: "This folder contains isolated testing virtual environments generated by Tox. Deleting this is safe: Tox will automatically recreate them next time you execute the test suites, though it will require a moment to install dependency packages."
  default_action: clean
