- id: slack_cache
  name: Slack workspace cache
  category: temporary_file
  risk: safe
  patterns:
    - "**/.config/Slack/Cache"
    - "**/.config/Slack/Code Cache"
  reason: "This directory contains cached UI graphics, team avatars, and media files. Deleting this is safe: Slack will download them again when needed. It will NOT log you out of your workspaces, reset your settings, or delete your chat history."
  default_action: clean

- id: steam_shader_cache
  name: Steam shader pre-caching
  category: framework_cache
  risk: review
  patterns:
    - "**/.local/share/Steam/steamapps/shadercache"
  reason: "This directory contains pre-compiled Vulkan and OpenGL shaders for games. Deleting this will NOT delete your game library, game saves, or Steam account details. However, it requires a 'review' because your games will compile shaders again on startup, which may cause long startup compilation times or initial gameplay stuttering."
  default_action: review
