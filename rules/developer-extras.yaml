- id: nox_cache
  name: Nox environment cache
  category: framework_cache
  risk: safe
  patterns:
    - "**/.nox"
  reason: "This folder contains Nox's isolated Python environments used for multi-version testing. Deleting this is safe: Nox will automatically rebuild the environments on your next run, though it will take a moment to re-install dependencies."
  default_action: clean

- id: nuxt_output
  name: Nuxt.js output directory
  category: build_artifact
  risk: safe
  patterns:
    - "**/.output"
  reason: "This folder contains the compiled production build output of your Nuxt project. Deleting this is completely safe: it does not affect source files, and it can be regenerated by running 'npm run build'."
  default_action: clean

- id: dart_tool
  name: Dart/Flutter build cache
  category: build_artifact
  risk: safe
  patterns:
    - "**/.dart_tool"
  reason: "This folder contains local package configuration files and intermediate build artifacts for Dart/Flutter projects. Deleting this is safe: running 'flutter pub get' or building the app will recreate it, though the first next build will take slightly longer."
  default_action: clean

- id: zig_cache
  name: Zig compiler cache
  category: build_artifact
  risk: safe
  patterns:
    - "**/.zig-cache"
    - "**/zig-out"
  reason: "This directory contains compiled object files and build cache for Zig projects. Deleting this is safe and will not affect your source code. The cache will be rebuilt on the next run of 'zig build'."
  default_action: clean

- id: angular_cache
  name: Angular build cache
  category: framework_cache
  risk: safe
  patterns:
    - "**/.angular"
  reason: "This directory contains cached compilation assets used by the Angular CLI to speed up incremental builds. Deleting this is safe: it does not delete source code, and Angular will regenerate the cache on the next build."
  default_action: clean

- id: svelte_kit_cache
  name: SvelteKit build output
  category: framework_cache
  risk: safe
  patterns:
    - "**/.svelte-kit"
  reason: "This folder stores intermediate build code generated by SvelteKit. Deleting this is safe: the framework will recreate it dynamically when you run the development server or build the project."
  default_action: clean

- id: astro_cache
  name: Astro build cache
  category: framework_cache
  risk: safe
  patterns:
    - "**/.astro"
  reason: "This folder contains temporary runtime files, package caches, and configurations generated by Astro. Deleting this is safe: it will be recreated on the next dev/build execution."
  default_action: clean

- id: react_native_ndk
  name: React Native Android NDK cache
  category: build_artifact
  risk: safe
  patterns:
    - "**/.cxx"
  reason: "This folder contains native C++ intermediate compilation outputs used by the Android NDK in React Native. Deleting this is safe: Gradle will compile the native libraries again during the next build, though the build time will increase."
  default_action: clean

- id: expo_cache
  name: Expo framework cache
  category: framework_cache
  risk: safe
  patterns:
    - "**/.expo"
  reason: "This directory contains temporary metadata and asset caching files for Expo mobile projects. Deleting this is safe: it only speeds up incremental builds and will be regenerated next time you run Expo."
  default_action: clean

- id: swift_pm_cache
  name: Swift PM build cache
  category: build_artifact
  risk: safe
  patterns:
    - "**/.build"
  reason: "This folder contains the compiled binaries of packages fetched by the Swift Package Manager. Deleting this is safe: Swift PM will fetch and compile them again on the next run."
  default_action: clean

- id: rustup_downloads
  name: Rustup download cache
  category: language_cache
  risk: safe
  patterns:
    - "**/.rustup/downloads"
  reason: "This folder holds temporary downloaded tarballs of Rust toolchain updates. Deleting this is safe: it only holds historical installations and has no impact on your active compilers."
  default_action: clean

- id: cpan_build
  name: CPAN build cache
  category: build_artifact
  risk: safe
  patterns:
    - "**/.cpan/build"
  reason: "This directory stores intermediate build files generated when compiling Perl modules via CPAN. Deleting this is safe: it does not affect already installed modules."
  default_action: clean

- id: gem_spec_cache
  name: Ruby Gem cache
  category: language_cache
  risk: safe
  patterns:
    - "**/.gem/specs"
  reason: "This directory contains cached specifications files for Ruby Gems. Deleting this is safe: Ruby will fetch them again from RubyGems if you install new gems."
  default_action: clean

- id: uv_cache
  name: UV cache
  category: framework_cache
  risk: safe
  patterns:
    - "**/.cache/uv"
  reason: "This directory stores cached wheel metadata and packages managed by the UV Python package manager. Deleting this is safe: UV will re-download packages on demand."
  default_action: clean

- id: pip_cache
  name: PIP cache
  category: framework_cache
  risk: safe
  patterns:
    - "**/.cache/pip"
  reason: "This folder stores downloaded wheel packages for pip. Deleting this is safe: it does not affect currently installed virtual environments or system packages. Future installs will re-download packages."
  default_action: clean

- id: bun_cache
  name: Bun cache
  category: framework_cache
  risk: safe
  patterns:
    - "**/.bun/install/cache"
  reason: "This folder stores package zipfiles downloaded by Bun. Deleting this is safe: Bun will re-fetch them from npm on the next install."
  default_action: clean

- id: yarn_cache
  name: Yarn package cache
  category: framework_cache
  risk: safe
  patterns:
    - "**/.yarn/cache"
  reason: "This folder stores cached package tarballs for Yarn. Deleting this is safe: it only speeds up offline installations, and Yarn will re-download packages if not cached."
  default_action: clean

- id: pnpm_cache
  name: PNPM global store
  category: framework_cache
  risk: review
  patterns:
    - "**/.local/share/pnpm/store"
  reason: "This directory holds the global content-addressable store of hardlinked dependencies for PNPM. Deleting this is safe, but it will break projects referencing deleted files if they were hard-linked, requiring a 'pnpm install' in those projects to restore them."
  default_action: review
