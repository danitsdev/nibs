id: gemini-cli
name: Gemini CLI
category: dev_ai_agent
platforms: [linux]
detect:
  commands: ["gemini"]
  paths:
    - "~/.gemini"
    - "~/.config/gemini"
items:
  - id: config-auth
    name: Gemini CLI configuration and auth
    risk: risky
    safety_class: secret_or_auth
    default_action: never
    paths:
      - "**/.gemini"
      - "**/.config/gemini"
    reason: "Gemini CLI configuration may contain authentication state, preferences, provider configuration, or API keys. Nibble does not auto-clean it."
