id: claude-code
name: Claude Code
category: dev_ai_agent
platforms: [linux]
detect:
  commands: ["claude"]
  paths:
    - "~/.claude"
    - "~/.claude.json"
items:
  - id: debug-logs
    name: Claude Code debug logs
    risk: safe
    safety_class: safe
    default_action: clean
    paths:
      - "**/.claude/logs"
      - "**/.claude/debug"
      - "**/.claude/*.log"
    reason: "Claude Code debug logs are troubleshooting output. Cleaning them does not remove projects, settings, auth state, or source files."
    restore:
      - "Run Claude Code again to generate fresh logs."

  - id: transient-caches
    name: Claude Code transient caches
    risk: safe
    safety_class: safe
    default_action: clean
    paths:
      - "**/.claude/paste-cache"
      - "**/.claude/image-cache"
      - "**/.claude/shell-snapshots"
      - "**/.claude/cache"
      - "**/.claude/plugins/cache"
    reason: "These folders hold temporary pasted payloads, generated image payloads, or shell snapshots from past sessions. They can be rebuilt or recreated when needed."

  - id: session-history
    name: Claude Code sessions and history
    risk: review
    safety_class: user_data
    default_action: review
    paths:
      - "**/.claude/projects"
      - "**/.claude/sessions"
      - "**/.claude/history.jsonl"
      - "**/.claude/file-history"
    reason: "Claude Code session data can contain prompts, terminal output, file snapshots, project context, and other personal or sensitive development history."

  - id: settings-auth
    name: Claude Code settings and auth state
    risk: risky
    safety_class: secret_or_auth
    default_action: never
    paths:
      - "**/.claude.json"
      - "**/.claude/settings.json"
      - "**/.claude/**/settings.json"
    reason: "These files may contain permissions, account state, tokens, preferences, or project-specific configuration. Nibble reports them only if they are unusually large."
