id: npm
name: npm and npx
category: language_cache
platforms: [linux]
detect:
  commands: ["npm", "npx", "node"]
  paths:
    - "~/.npm"
    - "~/.cache/npm"
items:
  - id: package-cache
    name: npm package cache
    risk: safe
    safety_class: usually_safe
    default_action: review
    paths:
      - "**/.npm/_cacache"
      - "**/.cache/npm"
    reason: "npm package cache stores downloaded package tarballs and metadata. Cleaning it is safe for project data, but future installs may be slower and require re-downloads."
    restore:
      - "npm install"

  - id: npx-cache
    name: npx command cache
    risk: review
    safety_class: rebuildable
    default_action: review
    paths:
      - "**/.npm/_npx"
    reason: "npx cache contains temporary command installs. It is rebuildable, but Nibble does not yet know which commands produced each entry."
    restore:
      - "npx <command>"
