id: qbittorrent
name: qBittorrent
category: desktop_app_cache
platforms: [linux]
detect:
  commands: ["qbittorrent", "qbittorrent-nox"]
  desktop_files: ["*qbittorrent*.desktop"]
  paths:
    - "~/.config/qBittorrent"
    - "~/.local/share/data/qBittorrent"
    - "~/.local/share/qBittorrent"
    - "~/.var/app/org.qbittorrent.qBittorrent"
items:
  - id: logs
    name: qBittorrent logs
    risk: safe
    safety_class: safe
    default_action: clean
    paths:
      - "**/.local/share/data/qBittorrent/logs"
      - "**/.local/share/qBittorrent/logs"
      - "**/.var/app/org.qbittorrent.qBittorrent/data/qBittorrent/logs"
    reason: "qBittorrent logs are diagnostic output. Cleaning them does not remove torrents, downloaded files, settings, or resume state."

  - id: torrent-state
    name: qBittorrent torrent state
    risk: risky
    safety_class: user_data
    default_action: never
    paths:
      - "**/.local/share/data/qBittorrent/BT_backup"
      - "**/.local/share/qBittorrent/BT_backup"
      - "**/.var/app/org.qbittorrent.qBittorrent/data/qBittorrent/BT_backup"
    reason: "qBittorrent torrent and fastresume files control active torrent state. Cleaning them can lose torrent tracking state, so Nibble must not clean them by default."
