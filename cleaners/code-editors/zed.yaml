id: zed
name: Zed
category: desktop_app_cache
platforms: [linux]
detect:
  commands: ["zed"]
  desktop_files: ["*zed*.desktop"]
  paths:
    - "~/.config/zed"
    - "~/.local/share/zed"
    - "~/.cache/zed"
items:
  - id: app-cache
    name: Zed app cache
    risk: safe
    safety_class: safe
    default_action: clean
    paths:
      - "**/.cache/zed"
      - "**/.config/zed/Cache"
      - "**/.config/zed/Code Cache"
      - "**/.config/zed/GPUCache"
    reason: "Zed cache stores temporary UI and rendering cache files. Cleaning it does not remove projects, settings, or source code."

  - id: logs
    name: Zed logs
    risk: safe
    safety_class: safe
    default_action: clean
    paths:
      - "**/.local/share/zed/logs"
      - "**/.config/zed/logs"
    reason: "Zed logs are diagnostic output. Cleaning them does not remove projects, settings, or source code."
