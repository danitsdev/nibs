id: microsoft-teams
name: Microsoft Teams
category: desktop_app_cache
platforms: [linux]
detect:
  commands: ["teams", "teams-for-linux"]
  desktop_files: ["*teams*.desktop"]
  paths:
    - "~/.config/Microsoft/Microsoft Teams"
    - "~/.config/Microsoft Teams"
    - "~/.config/teams"
    - "~/.var/app/com.microsoft.Teams"
items:
  - id: app-cache
    name: Microsoft Teams app cache
    risk: safe
    safety_class: safe
    default_action: clean
    paths:
      - "**/.config/Microsoft/Microsoft Teams/Cache"
      - "**/.config/Microsoft/Microsoft Teams/Code Cache"
      - "**/.config/Microsoft/Microsoft Teams/GPUCache"
      - "**/.config/Microsoft Teams/Cache"
      - "**/.config/Microsoft Teams/Code Cache"
      - "**/.config/Microsoft Teams/GPUCache"
      - "**/.config/teams/Cache"
      - "**/.config/teams/Code Cache"
      - "**/.config/teams/GPUCache"
      - "**/.var/app/com.microsoft.Teams/config/Microsoft/Microsoft Teams/Cache"
    reason: "Microsoft Teams cache stores temporary UI assets, compiled code cache, and GPU cache. Cleaning it does not remove chats, teams, settings, or login state."

  - id: logs
    name: Microsoft Teams logs
    risk: safe
    safety_class: safe
    default_action: clean
    paths:
      - "**/.config/Microsoft/Microsoft Teams/logs"
      - "**/.config/Microsoft Teams/logs"
      - "**/.config/teams/logs"
    reason: "Microsoft Teams logs are diagnostic output. Cleaning them does not remove account state or chat data."
