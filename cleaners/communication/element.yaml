id: element
name: Element
category: desktop_app_cache
platforms: [linux]
detect:
  commands: ["element-desktop", "element", "riot-web"]
  desktop_files: ["*element*.desktop", "*riot*.desktop"]
  paths:
    - "~/.config/Element"
    - "~/.config/Riot"
    - "~/.var/app/im.riot.Riot"
items:
  - id: app-cache
    name: Element app cache
    risk: safe
    safety_class: safe
    default_action: clean
    paths:
      - "**/.config/Element/Cache"
      - "**/.config/Element/Code Cache"
      - "**/.config/Element/GPUCache"
      - "**/.config/Element/Service Worker/CacheStorage"
      - "**/.config/Riot/Cache"
      - "**/.config/Riot/Code Cache"
      - "**/.config/Riot/GPUCache"
      - "**/.var/app/im.riot.Riot/config/Element/Cache"
      - "**/.var/app/im.riot.Riot/config/Element/Code Cache"
      - "**/.var/app/im.riot.Riot/config/Element/GPUCache"
    reason: "Element cache stores temporary Matrix client assets, previews, compiled code cache, and GPU cache. Cleaning it does not remove rooms, messages, settings, or login state."

  - id: identity-data
    name: Element session and identity data
    risk: risky
    safety_class: secret_or_auth
    default_action: never
    paths:
      - "**/.config/Element/Local Storage"
      - "**/.config/Element/Session Storage"
      - "**/.config/Element/Cookies"
      - "**/.config/Riot/Local Storage"
      - "**/.config/Riot/Session Storage"
      - "**/.config/Riot/Cookies"
    reason: "Element local storage can contain Matrix session state, encryption metadata, cookies, and account-linked data. Nibble must not clean it by default."
