id: spotify
name: Spotify
category: desktop_app_cache
platforms: [linux]
detect:
  commands: ["spotify"]
  desktop_files: ["*spotify*.desktop"]
  paths:
    - "~/.cache/spotify"
    - "~/.config/spotify"
    - "~/.var/app/com.spotify.Client"
items:
  - id: web-ui-cache
    name: Spotify UI cache
    risk: safe
    safety_class: safe
    default_action: clean
    paths:
      - "**/.cache/spotify/Browser"
      - "**/.cache/spotify/Code Cache"
      - "**/.cache/spotify/GPUCache"
      - "**/.var/app/com.spotify.Client/cache/spotify/Browser"
      - "**/.var/app/com.spotify.Client/cache/spotify/Code Cache"
      - "**/.var/app/com.spotify.Client/cache/spotify/GPUCache"
    reason: "Spotify UI cache stores temporary web UI assets and GPU cache. Cleaning it does not remove your account, playlists, preferences, or local music files."

  - id: offline-media-cache
    name: Spotify offline media cache
    risk: review
    safety_class: user_data
    default_action: review
    paths:
      - "**/.cache/spotify/Storage"
      - "**/.cache/spotify/Data"
      - "**/.var/app/com.spotify.Client/cache/spotify/Storage"
      - "**/.var/app/com.spotify.Client/cache/spotify/Data"
    reason: "Spotify media cache may include downloaded offline songs and large audio data. Cleaning it can free space, but offline content may need to be downloaded again."
